interface:
  display_name: "Knowledge Base 项目管理"
  short_description: "读取项目 brief、journal 和 blocker，输出项目摘要、里程碑、风险与个人执行板"
  default_prompt: "Use $knowledge-base-project-management to run the PM mainline for this project. Read the relevant brief, journal/task context, and vault profile when applicable. Generate a management-layer summary with milestones, risks, dependencies, next actions, and execution-board updates. Route multi-person items to team coordination, durable knowledge to maintenance, and delivery readiness checks to delivery audit."
policy:
  allow_implicit_invocation: true
