name: Validate repository

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate skill bundle structure
        run: |
          python - <<'PY'
          from pathlib import Path
          root = Path('.')
          skill_dirs = sorted((root / 'skills').iterdir())
          assert skill_dirs, 'No skills found under skills/'
          required = [
              Path('SKILL.md'),
              Path('references'),
              Path('agents/openai.yaml'),
          ]
          for skill_dir in skill_dirs:
              if not skill_dir.is_dir():
                  continue
              missing = [str(p) for p in required if not (skill_dir / p).exists()]
              if missing:
                  raise SystemExit(f'{skill_dir}: missing {missing}')
          print('Skill bundle structure validated.')
          PY

      - name: Validate relative links
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          root = Path('.')
          # 跳过示例文件，这些文件包含假设性链接来说明 vault 结构
          skip_dirs = {root / 'examples'}
          files = [
              f for f in [*root.rglob('*.md'), *root.rglob('*.html')]
              if not any(str(f).startswith(str(sd)) for sd in skip_dirs)
          ]
          link_pattern = re.compile(r'\[[^\]]*\]\(([^)]+)\)')
          missing = []
          for file in files:
              text = file.read_text(encoding='utf-8', errors='ignore')
              # 按行处理，跟踪代码块状态
              lines = text.split('\n')
              in_code_block = False
              for line_idx, line in enumerate(lines):
                  # 检测代码块边界
                  if line.strip().startswith('```'):
                      in_code_block = not in_code_block
                      continue
                  # 跳过代码块内的链接
                  if in_code_block:
                      continue
                  # 检查该行上的链接
                  for match in link_pattern.finditer(line):
                      target = match.group(1)
                      if target.startswith(('http://', 'https://', 'mailto:', '#', 'data:')):
                          continue
                      target = target.split('#', 1)[0]
                      if not target:
                          continue
                      resolved = (file.parent / target).resolve()
                      try:
                          resolved.relative_to(root.resolve())
                      except ValueError:
                          pass
                      if not resolved.exists():
                          missing.append((str(file), target, line_idx + 1))
          if missing:
              for file, target, line_num in missing:
                  print(f'Missing link target: {file}:{line_num} -> {target}')
              raise SystemExit(1)
          print('Relative link validation passed.')
          PY
